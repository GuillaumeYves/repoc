version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      runtime-dependencies:
        applies-to: version-updates
        patterns:
          - "typer"
          - "rich"
          - "httpx"
          - "pydantic"
          - "pyyaml"
      dev-dependencies:
        applies-to: version-updates
        patterns:
          - "pytest*"
          - "ruff"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
